  [/Bedrock|Vertex AI|CLAUDE_CODE_USE_BEDROCK/i,"https://docs.anthropic.com/en/docs/claude-code/bedrock-vertex"],
  [/streaming|SSE|delta event/i,"https://docs.anthropic.com/en/api/messages-streaming"],
  [/Files API|PDF support|document QA|Vision.*image/i,"https://docs.anthropic.com/en/docs/build-with-claude/pdf-support"],
  [/extended thinking|adaptive thinking/i,"https://docs.anthropic.com/en/docs/build-with-claude/extended-thinking"],
  [/Models.*Opus|Sonnet|Haiku/i,"https://docs.anthropic.com/en/docs/about-claude/models"],
  [/JIRA|Linear.*integration|Figma.*code|database integrat/i,"https://modelcontextprotocol.io/examples"],
  [/capstone|combine all|portfolio/i,"https://docs.anthropic.com/en/docs/claude-code/overview"],

function getTopicUrl(t){for(const[r,u]of TOPIC_RULES){if(r.test(t))return u}return null}

/* ── Storage ── */
const SK="claude-study-v3";
function load(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch{return{}}}
function save(s){try{localStorage.setItem(SK,JSON.stringify(s))}catch{}}

/* ── Styles ── */
const B={bg:"#0a0e1a",surface:"#111827",surface2:"#1a2234",border:"#1e2d45",text:"#e2e8f0",muted:"#64748b",dim:"#94a3b8"};

/* ── Source URL map ── */
const SRC_URLS={"docs.claude.com":"https://docs.claude.com","docs.claude.com/agents":"https://docs.anthropic.com/en/docs/build-with-claude/agentic-tool-use","docs.claude.com/mcp":"https://docs.anthropic.com/en/docs/claude-code/mcp","docs.claude.com/claude-code":"https://docs.anthropic.com/en/docs/claude-code/overview","docs.claude.com/prompt-engineering":"https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview","docs.claude.com/reliability":"https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview","docs.claude.com/tool-use":"https://docs.anthropic.com/en/docs/build-with-claude/tool-use/overview","docs.claude.com/context-management":"https://docs.anthropic.com/en/docs/build-with-claude/context-windows","modelcontextprotocol.io":"https://modelcontextprotocol.io","modelcontextprotocol.io/docs":"https://modelcontextprotocol.io/docs","modelcontextprotocol.io/specification":"https://modelcontextprotocol.io/specification","modelcontextprotocol.io/docs/develop/build-server":"https://modelcontextprotocol.io/docs/develop/build-server","anthropic.skilljar.com":"https://anthropic.skilljar.com","code.claude.com/docs":"https://docs.anthropic.com/en/docs/claude-code/overview","code.claude.com/docs/en/cli-reference":"https://docs.anthropic.com/en/docs/claude-code/cli-usage","code.claude.com/docs/en/sub-agents":"https://docs.anthropic.com/en/docs/claude-code/sub-agents","platform.claude.com/docs":"https://docs.anthropic.com/en/api/getting-started","platform.claude.com/docs/agents-and-tools":"https://docs.anthropic.com/en/docs/agents-and-tools","platform.claude.com/docs/prompt-engineering":"https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview","anthropic.skilljar.com/claude-code-in-action":"https://anthropic.skilljar.com"};

function SourceLink({src}){
  const parts=src.split(" · ");
  return <div style={{fontSize:11,color:B.muted,marginTop:2}}>📎 {parts.map((s,i)=>{
    const tr=s.trim();const url=SRC_URLS[tr];
    return <span key={i}>{i>0?" · ":""}{url?<a href={url} target="_blank" rel="noopener noreferrer" style={{color:"#6ee7b7",textDecoration:"none",borderBottom:"1px dashed #6ee7b760"}} onClick={e=>e.stopPropagation()}>{tr}</a>:tr}</span>;
  })}</div>;
}

function DTag({code}){const d=DOMAINS[code];if(!d)return null;return <span style={{fontSize:10,padding:"2px 7px",borderRadius:4,fontWeight:600,background:d.color+"18",border:"1px solid "+d.color+"40",color:d.color}}>{code}</span>}

function TopicPill({t}){
  const url=getTopicUrl(t);
  const base={fontSize:12,padding:"3px 10px",borderRadius:6,background:B.surface2,border:"1px solid "+B.border,color:B.dim,display:"inline-flex",alignItems:"center",gap:4};
  if(!url)return <span style={base}>{t}</span>;
  return <a href={url} target="_blank" rel="noopener noreferrer" style={{...base,textDecoration:"none",cursor:"pointer",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#6ee7b780";e.currentTarget.style.color="#6ee7b7"}} onMouseLeave={e=>{e.currentTarget.style.borderColor=B.border;e.currentTarget.style.color=B.dim}}>{t}<span style={{fontSize:9,opacity:0.5}}>↗</span></a>;
}

function DayRow({d,phaseKey,color,done,onToggle}){
  const[open,setOpen]=useState(false);const k=phaseKey+"_"+d.day;
  return(
    <div style={{borderLeft:"1px solid "+B.border,borderRight:"1px solid "+B.border,borderBottom:"1px solid "+B.border,background:done?"rgba(34,197,94,0.03)":"transparent"}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:12,padding:"13px 20px",cursor:"pointer"}} onClick={()=>setOpen(o=>!o)}>
        <button onClick={e=>{e.stopPropagation();onToggle(k)}} style={{flexShrink:0,width:22,height:22,borderRadius:"50%",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",border:done?"2px solid #22c55e":"2px solid "+B.border,background:done?"#22c55e":"transparent",marginTop:1}}>{done?"✓":""}</button>
        <span style={{fontFamily:"'Syne',sans-serif",fontSize:10,fontWeight:800,padding:"3px 8px",borderRadius:5,background:color+"22",color,textTransform:"uppercase",letterSpacing:0.5,flexShrink:0,marginTop:2}}>Day {d.day}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:500,fontSize:14,color:B.text,textDecoration:done?"line-through":"none",opacity:done?0.6:1}}>{d.title}</div>
          <SourceLink src={d.source}/>
          {d.domains&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:5}}>{d.domains.map(c=><DTag key={c} code={c}/>)}</div>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <span style={{fontSize:11,color:B.muted}}>⏱ {d.hours}h</span>
          <span style={{fontSize:11,color:B.muted,transition:"transform 0.2s",transform:open?"rotate(180deg)":"none"}}>▼</span>
        </div>
      </div>
      {open&&(
        <div style={{padding:"0 20px 16px 56px",background:"rgba(0,0,0,0.2)"}}>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,color:B.muted,marginBottom:6}}>Topics</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>{d.topics.map((t,i)=><TopicPill key={i} t={t}/>)}</div>
          </div>
          <div style={{background:"rgba(245,158,11,0.06)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:8,padding:"10px 14px"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#f59e0b",marginBottom:3}}>🔨 Practice Task</div>
            <div style={{fontSize:13,color:"#fde68a"}}>{d.practice}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function Phase({id,title,badge,color,days,completed,onToggle,defaultOpen}){
  const[open,setOpen]=useState(defaultOpen);
  const done=days.filter(d=>completed[id+"_"+d.day]).length;
  return(
    <div style={{marginBottom:20}}>
      <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:12,padding:"16px 20px",borderRadius:open?"12px 12px 0 0":"12px",cursor:"pointer",border:"1px solid "+B.border,background:open?color+"10":B.surface,transition:"background 0.2s"}}>
        <span style={{fontFamily:"'Syne',sans-serif",fontSize:10,fontWeight:800,padding:"4px 10px",borderRadius:6,textTransform:"uppercase",letterSpacing:1,background:color+"22",color,flexShrink:0}}>{badge}</span>
        <span style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:700,flex:1,color:B.text}}>{title}</span>
        <span style={{fontSize:11,color:B.muted}}>{done}/{days.length} done</span>
        <span style={{fontSize:12,color:B.muted,transition:"transform 0.2s",transform:open?"rotate(180deg)":"none"}}>▼</span>
      </div>
      {open&&days.map((d,i)=><DayRow key={i} d={d} phaseKey={id} color={color} done={!!completed[id+"_"+d.day]} onToggle={onToggle}/>)}
    </div>
  );
}

function App(){
  const[completed,setCompleted]=useState(load);
  const[tab,setTab]=useState("cert");

  useEffect(()=>{save(completed)},[completed]);
  const toggle=useCallback(k=>setCompleted(p=>{const n={...p,[k]:!p[k]};return n}),[]);

  const certDone=CERT_DAYS.filter(d=>completed["cert_"+d.day]).length;
  const extDays=EXT_WEEKS.flatMap(w=>w.days);
  const extDone=extDays.filter(d=>completed["ext_"+d.day]).length;
  const total=CERT_DAYS.length+extDays.length;
  const totalDone=certDone+extDone;
  const pct=Math.round((totalDone/total)*100);

  const ts=t=>({padding:"8px 18px",borderRadius:8,border:"1px solid "+B.border,fontWeight:600,fontSize:13,cursor:"pointer",transition:"all 0.2s",background:tab===t?"#f59e0b":B.surface,color:tab===t?"#000":B.dim,borderColor:tab===t?"#f59e0b":B.border});

  return(
    <div style={{fontFamily:"'DM Sans',system-ui,sans-serif",background:B.bg,color:B.text,minHeight:"100vh",fontSize:14,lineHeight:1.6}}>
      {/* HERO */}
      <div style={{background:"linear-gradient(135deg,#0a0e1a 0%,#0f172a 40%,#1a1040 100%)",borderBottom:"1px solid "+B.border,padding:"36px 24px 28px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-60,right:-60,width:320,height:320,background:"radial-gradient(circle,rgba(245,158,11,0.12) 0%,transparent 70%)",pointerEvents:"none"}}/>
        <div style={{maxWidth:960,margin:"0 auto",position:"relative",zIndex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:16,marginBottom:20}}>
            <div>
              <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:"#fff",letterSpacing:-0.5}}>Claude Learning Plan <span style={{color:"#f59e0b"}}>2026</span></h1>
              <div style={{fontSize:12,color:B.muted,marginTop:4}}>Phase 1: Architect Cert (Day 0–15) · Phase 2: Full Onboarding (Day 0–20)</div>
            </div>
            <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
              {[{n:certDone+"/16",l:"Cert Days",c:"#f59e0b"},{n:extDone+"/21",l:"Onboard Days",c:"#06b6d4"},{n:pct+"%",l:"Overall",c:"#f59e0b"}].map(s=>(
                <div key={s.l} style={{background:"rgba(255,255,255,0.05)",border:"1px solid "+B.border,borderRadius:10,padding:"10px 16px",textAlign:"center",minWidth:70}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:s.c}}>{s.n}</div>
                  <div style={{fontSize:10,color:B.muted,textTransform:"uppercase",letterSpacing:0.8}}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{marginBottom:18}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:B.muted,marginBottom:6}}><span>{totalDone} of {total} days complete</span><span>{pct}%</span></div>
            <div style={{background:B.border,borderRadius:999,height:6,overflow:"hidden"}}><div style={{height:6,borderRadius:999,background:"linear-gradient(90deg,#f59e0b,#8b5cf6)",width:pct+"%",transition:"width 0.4s"}}/></div>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[{t:"🎯 Phase 1: Architect Cert (16 days)",c:"#f59e0b"},{t:"🚀 Phase 2: Full Onboarding (21 days)",c:"#06b6d4"},{t:"3 hrs/day",c:"#8b5cf6"},{t:"~48hrs cert · ~63hrs onboarding",c:"#10b981"}].map(ch=>(
              <span key={ch.t} style={{fontSize:11,fontWeight:600,padding:"4px 12px",borderRadius:999,border:"1px solid "+ch.c+"30",background:ch.c+"18",color:ch.c}}>{ch.t}</span>
            ))}
          </div>
        </div>
      </div>

      {/* MAIN */}
      <div style={{maxWidth:960,margin:"0 auto",padding:"24px 16px 60px"}}>
        <div style={{display:"flex",gap:6,marginBottom:24,flexWrap:"wrap"}}>
          <button style={ts("cert")} onClick={()=>setTab("cert")}>🎯 Architect Cert</button>
          <button style={ts("ext")} onClick={()=>setTab("ext")}>🚀 Full Onboarding</button>
          <button style={ts("ref")} onClick={()=>setTab("ref")}>📖 Exam Reference</button>
        </div>

        {tab==="cert"&&<>
          <div style={{background:B.surface,border:"1px solid "+B.border,borderRadius:12,padding:"18px 20px",marginBottom:20}}>
            <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:700,color:B.dim,marginBottom:12,textTransform:"uppercase",letterSpacing:0.8}}>Exam Domain Legend</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:8}}>
              {Object.entries(DOMAINS).map(([k,d])=>(
                <div key={k} style={{display:"flex",alignItems:"center",gap:8,background:B.surface2,border:"1px solid "+B.border,borderRadius:8,padding:"8px 12px"}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:d.color,flexShrink:0}}/><div style={{fontSize:12,fontWeight:600,color:B.text}}>{k}: {d.label}</div><div style={{fontSize:11,color:B.muted,marginLeft:"auto"}}>{d.pct}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12,marginBottom:24}}>
            {[{t:"Cert Days",v:"0–15",s:"16 days total",c:"#f59e0b"},{t:"Hours Total",v:"48h",s:"3 hrs/day",c:"#8b5cf6"},{t:"Exam Score",v:720,s:"Min passing",c:"#10b981"},{t:"Domains",v:5,s:"27%·18%·20%·20%·15%",c:"#3b82f6"}].map(c=>(
              <div key={c.t} style={{background:B.surface,border:"1px solid "+B.border,borderTop:"3px solid "+c.c,borderRadius:12,padding:16}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:700,color:c.c,marginBottom:4}}>{c.t}</div>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:28,fontWeight:800,color:c.c}}>{c.v}</div>
                <div style={{fontSize:11,color:B.muted,marginTop:2}}>{c.s}</div>
              </div>
            ))}
          </div>
          <Phase id="cert" title="Architect Certification — Day 0 to 15" badge="CERT" color="#f59e0b" days={CERT_DAYS} completed={completed} onToggle={toggle} defaultOpen={true}/>
        </>}

        {tab==="ext"&&<>
          <div style={{background:B.surface,border:"1px solid "+B.border,borderRadius:12,padding:16,marginBottom:20}}>
            <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:15,color:"#06b6d4",marginBottom:6}}>Extended Onboarding Plan</h3>
            <p style={{color:B.muted,fontSize:13}}>After passing the cert, this 21-day plan (Day 0–20) covers Claude Code surfaces, MCP deep dive, Platform API, CI/CD, and a capstone project.</p>
          </div>
          {EXT_WEEKS.map((w,wi)=><Phase key={wi} id="ext" title={w.label} badge={"W"+(wi+1)} color="#06b6d4" days={w.days} completed={completed} onToggle={toggle} defaultOpen={wi===0}/>)}
        </>}

        {tab==="ref"&&<>
          <div style={{background:B.surface,border:"1px solid "+B.border,borderRadius:12,padding:"18px 20px",marginBottom:16}}>
            <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:700,color:B.dim,marginBottom:12,textTransform:"uppercase",letterSpacing:0.8}}>5 Exam Domains</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:8}}>
              {Object.entries(DOMAINS).map(([k,d])=>(
                <div key={k} style={{display:"flex",alignItems:"center",gap:8,background:B.surface2,border:"1px solid "+B.border,borderRadius:8,padding:"8px 12px"}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:d.color,flexShrink:0}}/><div style={{fontSize:12,fontWeight:600,color:B.text}}>{d.label}</div><div style={{fontSize:11,color:d.color,fontWeight:700,marginLeft:"auto"}}>{d.pct}</div>
                </div>
              ))}
            </div>
          </div>
          {EXAM_REF.map(sec=>(
            <div key={sec.title} style={{background:B.surface,border:"1px solid "+sec.color+"30",borderLeft:"3px solid "+sec.color,borderRadius:10,padding:16,marginBottom:14}}>
              <h3 style={{fontFamily:"'Syne',sans-serif",fontSize:13,color:sec.color,marginBottom:10,textTransform:"uppercase",letterSpacing:0.8}}>{sec.title}</h3>
              <ul style={{listStyle:"none",display:"flex",flexDirection:"column",gap:6}}>
                {sec.items.map((item,i)=>(
                  <li key={i} style={{display:"flex",gap:8,fontSize:13,color:B.dim}}>
                    <span style={{color:sec.color,flexShrink:0}}>›</span>
                    {typeof item==="object"&&item.url?(
                      <a href={item.url} target="_blank" rel="noopener noreferrer" style={{color:sec.color,textDecoration:"none",borderBottom:"1px dashed "+sec.color+"60"}}>{item.text} <span style={{fontSize:11,opacity:0.7}}>↗ {item.url.replace("https://","")}</span></a>
                    ):(<span>{item}</span>)}
                  </li>
                ))}
              </ul>
            </div>
          ))}
        </>}

        <div style={{textAlign:"center",paddingTop:32,fontSize:11,color:B.muted}}>Progress auto-saved to browser · Click ✓ to mark days complete · Good luck! 🎯</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
