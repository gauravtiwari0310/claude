<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Study Plan — Architect Cert + Full Onboarding</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2234;
    --border: #1e2d45;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --cert-a: #f59e0b;
    --cert-b: #ef4444;
    --cert-c: #3b82f6;
    --cert-d: #8b5cf6;
    --cert-e: #10b981;
    --phase2: #06b6d4;
    --accent: #f59e0b;
    --green: #22c55e;
    --green-dim: #166534;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  h1, h2, h3, h4 { font-family: 'Syne', sans-serif; }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(135deg, #0a0e1a 0%, #0f172a 40%, #1a1040 100%);
    border-bottom: 1px solid var(--border);
    padding: 36px 24px 28px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(245,158,11,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -80px; left: 30%;
    width: 400px; height: 200px;
    background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-inner { max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }

  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }

  .hero-title { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .hero-title span { color: var(--accent); }

  .hero-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .hero-stats { display: flex; gap: 16px; flex-wrap: wrap; }

  .stat-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    text-align: center;
    min-width: 70px;
  }

  .stat-box .num { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); }
  .stat-box .lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }

  /* Progress bar */
  .progress-wrap { margin-bottom: 18px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .progress-track { background: var(--border); border-radius: 999px; height: 6px; overflow: hidden; }
  .progress-fill { height: 6px; border-radius: 999px; background: linear-gradient(90deg, var(--cert-a), var(--cert-d)); transition: width 0.4s ease; }

  /* Chips */
  .chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    font-size: 11px; font-weight: 600;
    padding: 4px 12px; border-radius: 999px;
    border: 1px solid;
  }
  .chip-amber { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); color: var(--cert-a); }
  .chip-cyan  { background: rgba(6,182,212,0.1);  border-color: rgba(6,182,212,0.3);  color: var(--phase2); }
  .chip-purple{ background: rgba(139,92,246,0.1); border-color: rgba(139,92,246,0.3); color: var(--cert-d); }
  .chip-green { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); color: var(--cert-e); }

  /* ── MAIN ── */
  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
  .tab-btn {
    padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border);
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px;
    cursor: pointer; transition: all 0.2s;
    background: var(--surface); color: var(--text-dim);
  }
  .tab-btn:hover { border-color: var(--accent); color: var(--text); }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

  /* ── PHASE HEADER ── */
  .phase-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px; border-radius: 12px 12px 0 0;
    cursor: pointer; user-select: none;
    border: 1px solid var(--border);
    transition: background 0.2s;
  }
  .phase-header:hover { background: rgba(255,255,255,0.03); }

  .phase-badge {
    font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 800;
    padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 1px;
    flex-shrink: 0;
  }

  .phase-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; flex: 1; }
  .phase-meta { font-size: 11px; color: var(--text-muted); }
  .phase-chevron { font-size: 12px; color: var(--text-muted); transition: transform 0.2s; }
  .phase-chevron.open { transform: rotate(180deg); }

  /* ── WEEK ROW ── */
  .week-label {
    padding: 6px 20px;
    font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text-muted);
    background: rgba(255,255,255,0.02);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  /* ── DAY ROW ── */
  .day-row {
    border: 1px solid var(--border);
    border-top: none;
    transition: background 0.15s;
  }
  .day-row:last-child { border-radius: 0 0 12px 12px; }
  .day-row.done { background: rgba(34,197,94,0.03); }

  .day-header {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 13px 20px; cursor: pointer;
  }

  .check-btn {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--border); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--green); transition: all 0.2s;
    margin-top: 1px;
  }
  .check-btn.checked { background: var(--green); border-color: var(--green); }
  .check-btn:hover { border-color: var(--green); }

  .day-num {
    font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 800;
    padding: 3px 8px; border-radius: 5px; flex-shrink: 0; margin-top: 2px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .day-info { flex: 1; min-width: 0; }
  .day-title { font-weight: 500; font-size: 14px; color: var(--text); line-height: 1.4; }
  .day-source { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .day-domain-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
  .domain-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; }

  .day-chevron { font-size: 11px; color: var(--text-muted); flex-shrink: 0; margin-top: 4px; transition: transform 0.2s; }
  .day-chevron.open { transform: rotate(180deg); }

  /* ── DAY DETAIL ── */
  .day-detail {
    padding: 0 20px 16px 54px;
    background: rgba(0,0,0,0.2);
  }

  .detail-section { margin-bottom: 12px; }
  .detail-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-muted); margin-bottom: 6px;
  }

  .topic-pills { display: flex; flex-wrap: wrap; gap: 5px; }
  .topic-pill {
    font-size: 12px; padding: 3px 10px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  }

  .practice-box {
    background: rgba(245,158,11,0.06);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 8px; padding: 10px 14px;
  }
  .practice-box .p-label { font-size: 11px; font-weight: 700; color: var(--cert-a); margin-bottom: 3px; }
  .practice-box .p-text { font-size: 13px; color: #fde68a; }

  .hours-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text-muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 9px; margin-bottom: 10px;
  }

  /* ── PHASE WRAPPER ── */
  .phase-wrap { margin-bottom: 20px; }

  /* ── DOMAIN LEGEND ── */
  .legend {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px; margin-bottom: 20px;
  }
  .legend h3 { font-size: 13px; font-weight: 700; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.8px; }
  .legend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .legend-pct { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  /* ── OVERVIEW CARDS ── */
  .overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .ov-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .ov-card-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .ov-card-val { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .ov-card-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* scroll */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* responsive */
  @media(max-width: 600px) {
    .hero-stats { gap: 8px; }
    .stat-box .num { font-size: 18px; }
    .day-detail { padding-left: 20px; }
  }
</style>
</head>

/* ─────────────────────────────────────────────

───────────────────────────────────────────── */
const STORAGE_KEY = "claude-study-plan-v2";
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}

/* ─────────────────────────────────────────────

───────────────────────────────────────────── */
function DomainTag({ code }) {
  const d = DOMAINS[code];
  if (!d) return null;
  return (
    <span className="domain-tag" style={{
      background: d.color + "18",
      border: `1px solid ${d.color}40`,
      color: d.color
    }}>{code === "EX" ? "Extended" : code}</span>
  );
}

function DayRow({ d, phaseColor, certPhase, idx, completed, onToggle }) {
  const [open, setOpen] = useState(false);
  const done = completed[`${certPhase}_${d.day}`];

  return (
    <div className={`day-row ${done ? "done" : ""}`}>
      <div className="day-header" onClick={() => setOpen(o => !o)}>
        <button
          className={`check-btn ${done ? "checked" : ""}`}
          onClick={e => { e.stopPropagation(); onToggle(`${certPhase}_${d.day}`); }}
        >{done ? "✓" : ""}</button>

        <span className="day-num" style={{ background: phaseColor + "22", color: phaseColor }}>
          {certPhase === "cert" ? `Day ${d.day}` : `D${d.day}`}
        </span>

        <div className="day-info">
          <div className="day-title" style={{ textDecoration: done ? "line-through" : "none", opacity: done ? 0.6 : 1 }}>
            {d.title}
          </div>
          <div className="day-source">📎 {d.source}</div>
          {d.domains && (
            <div className="day-domain-tags">
              {d.domains.map(c => <DomainTag key={c} code={c} />)}
            </div>
          )}
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
          <span style={{ fontSize: 11, color: "#64748b" }}>⏱ {d.hours}h</span>
          <span style={{ fontSize: 11, color: "#475569" }}>📅 {d.date}</span>
          <span className={`day-chevron ${open ? "open" : ""}`}>▼</span>
        </div>
      </div>

      {open && (
        <div className="day-detail">
          <div className="detail-section">
            <div className="detail-label">Topics</div>
            <div className="topic-pills">
              {d.topics.map((t, i) => <span key={i} className="topic-pill">{t}</span>)}
            </div>
          </div>
          <div className="practice-box">
            <div className="p-label">🔨 Practice Task</div>
            <div className="p-text">{d.practice}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function PhaseBlock({ id, title, badge, color, bgChip, days, completed, onToggle, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen);
  const done = days.filter(d => completed[`cert_${d.day}`] || completed[`ext_${d.day}`]).length;

  return (
    <div className="phase-wrap">
      <div className="phase-header" style={{ background: open ? color + "10" : "var(--surface)" }} onClick={() => setOpen(o => !o)}>
        <span className="phase-badge" style={{ background: color + "22", color }}>{badge}</span>
        <span className="phase-title">{title}</span>
        <span className="phase-meta">{done}/{days.length} days done</span>
        <span className={`phase-chevron ${open ? "open" : ""}`}>▼</span>
      </div>
      {open && days.map((d, i) => (
        <DayRow
          key={i}
          d={d}
          phaseColor={color}
          certPhase={id}
          idx={i}
          completed={completed}
          onToggle={onToggle}
        />
      ))}
    </div>
  );
}
